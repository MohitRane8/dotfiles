# keyd configuration — Ubuntu OS
#
# This file is a reference copy of /etc/keyd/default.conf. It is NOT stowed
# (keyd reads the live file from /etc/keyd/, which is root-owned). Copy it
# manually whenever it changes:
#
#   sudo cp ~/dotfiles/keyd/etc/keyd/default.conf /etc/keyd/default.conf
#   sudo keyd.rvaiya reload
#
# See ENVIRONMENT-SETUP.md (Ubuntu OS Setup → Keyboard Modifications) for the
# full install steps.

[ids]

*

[main]

# Maps capslock to escape when pressed and control when held.
capslock = overload(control, esc)

# Remaps the escape key to capslock
esc = capslock
